<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        :root { --main-color: #00f2ff; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
            cursor: default;
            /* Bloqueia seleção de texto */
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* --- MENSAGEM DE COPYRIGHT --- */
        #copyright-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 20px 40px; border-radius: 15px;
            font-weight: bold; z-index: 999999; display: none;
            box-shadow: 0 0 30px var(--main-color);
            text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; backdrop-filter: blur(10px);
        }

        /* --- EFEITO ORIGINAL --- */
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, var(--main-color) 50%, transparent 55%);
            animation: lightSweep 12s linear infinite; pointer-events: none; z-index: 1; opacity: 0.1;
        }

        @keyframes lightSweep {
            0% { transform: translate(-30%, -30%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(360deg); }
        }

        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* --- TELA DE ENTRADA --- */
        #login-screen {
            position: fixed; z-index: 1000; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .login-box {
            background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px;
            border: 2px solid var(--main-color); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid var(--main-color);
            outline: none; background: rgba(0, 0, 0, 0.8); color: var(--main-color);
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
        }

        .btn-enter {
            padding: 12px 40px; background: var(--main-color); color: #000;
            border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-weight: 700; text-transform: uppercase;
            box-shadow: 0 0 20px var(--main-color);
            animation: neonPulse 1.5s infinite alternate; transition: 0.3s;
        }

        @keyframes neonPulse {
            from { box-shadow: 0 0 10px var(--main-color), 0 0 20px var(--main-color); }
            to { box-shadow: 0 0 30px var(--main-color), 0 0 50px var(--main-color); }
        }

        /* --- LAYOUT PRINCIPAL --- */
        #main-profile {
            display: none; opacity: 0; z-index: 50; position: relative;
            display: flex; height: 100vh; padding: 40px; box-sizing: border-box;
            gap: 40px; transition: opacity 1.5s;
        }

        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            height: fit-content; position: relative; z-index: 70;
        }

        .profile-pic {
            width: 180px; height: 180px; border-radius: 20px;
            border: 3px solid var(--main-color); box-shadow: 0 0 25px var(--main-color);
            object-fit: cover; margin-bottom: 20px;
        }

        .animated-gradient-text {
            background: linear-gradient(to right, var(--main-color), #ffffff, var(--main-color));
            background-size: 200% auto; color: transparent;
            -webkit-background-clip: text; background-clip: text;
            animation: gradientShift 3s linear infinite;
        }

        @keyframes gradientShift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        #ui-tools {
            position: fixed; bottom: 20px; right: 20px; z-index: 10001;
            display: none; gap: 10px; align-items: flex-end;
        }

        #visit-counter {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main-color);
            padding: 6px 12px; border-radius: 4px; display: flex; flex-direction: column; align-items: center;
        }

        /* --- SLIDER CENTRAL --- */
        .slider-container {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }
        .slideshow {
            width: 100%; height: 400px; position: relative;
            perspective: 1000px; display: flex; justify-content: center; align-items: center;
        }
        .slide-img {
            position: absolute; width: 280px; height: 380px; object-fit: cover; border-radius: 15px;
            border: 2px solid var(--main-color); box-shadow: 0 0 30px var(--main-color);
            transition: all 0.8s ease-in-out; opacity: 0;
        }
        .slide-img.active { opacity: 1; transform: translateZ(100px); z-index: 5; }
        .slide-img.prev { opacity: 0.4; transform: translateX(-250px) rotateY(25deg) scale(0.8); z-index: 2; }
        .slide-img.next { opacity: 0.4; transform: translateX(250px) rotateY(-25deg) scale(0.8); z-index: 2; }

    </style>
</head>
<body onload="init()">

    <div id="copyright-alert">Copyright © WRS - Protegido</div>
    <canvas id="star-canvas"></canvas>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--main-color);">LOGIN</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="ui-tools">
        <button class="btn-enter" style="padding: 8px 12px; animation: none;" onclick="changeTheme()">🎨 COR</button>
        <div id="visit-counter">
            <span style="color: var(--main-color); font-size: 8px; letter-spacing: 1px;">VISITAS</span>
            <span id="count-number" style="color: #fff; font-size: 18px; font-family: monospace;">...</span>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 class="animated-gradient-text">Gabriel Leandro</h2>
            <div id="player-placeholder">
                <p style="font-size: 10px; color: var(--main-color);">WRS GALERIA 2026</p>
            </div>
        </div>

        <div class="slider-container" id="center-slider">
            <h3 class="animated-gradient-text" style="letter-spacing: 5px;">PROJETOS</h3>
            <div class="slideshow" id="slide-wrap"></div>
        </div>
    </div>

    <script>
        const ID_VISITAS = "perfil_gabriel_2026_unique";

        // --- SISTEMA DE SEGURANÇA ---
        function mostrarAviso() {
            const aviso = document.getElementById('copyright-alert');
            aviso.style.display = 'block';
            setTimeout(() => { aviso.style.display = 'none'; }, 2000);
        }

        // Bloquear Botão Direito
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            mostrarAviso();
        });

        // Bloquear Atalhos (Ctrl+U, Ctrl+C, Ctrl+S)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'c' || e.key === 'C' || e.key === 's' || e.key === 'S' || e.key === 'i' || e.key === 'I')) {
                e.preventDefault();
                mostrarAviso();
            }
        });

        function carregarContadores() {
            fetch(`https://api.counterapi.dev/v1/wrs_galeria/${ID_VISITAS}/up`)
                .then(res => res.json())
                .then(res => { document.getElementById('count-number').innerText = res.count; })
                .catch(() => { document.getElementById('count-number').innerText = "000"; });
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-profile').style.display='flex';
                    document.getElementById('ui-tools').style.display='flex';
                    carregarContadores();
                    setTimeout(() => { document.getElementById('main-profile').style.opacity='1'; }, 50);
                }, 1000);
            } else alert("Senha incorreta!");
        }

        function init() {
            setupSlider();
        }

        function setupSlider() {
            const wrap = document.getElementById('slide-wrap');
            const fotos = ["https://i.imgur.com/Ip2Bdxv.png", "https://i.imgur.com/7rKeKT8.png", "https://i.imgur.com/Bx7jSbA.png"];
            fotos.forEach(src => { const img = document.createElement('img'); img.src = src; img.className = 'slide-img'; wrap.appendChild(img); });
            let idx = 0; const slides = document.querySelectorAll('.slide-img');
            function update() {
                slides.forEach(s => s.className = 'slide-img');
                if(slides[idx]) {
                    slides[idx].classList.add('active');
                    slides[(idx-1+slides.length)%slides.length].classList.add('prev');
                    slides[(idx+1)%slides.length].classList.add('next');
                    idx = (idx+1)%slides.length;
                }
            }
            update(); setInterval(update, 3000);
        }
    </script>
</body>
</html>
