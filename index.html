<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        #star-canvas, #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #star-canvas { z-index: 1; }
        #cursor-canvas { z-index: 9999; }

        /* LOGIN */
        #login-screen {
            position: fixed;
            z-index: 1000;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s;
        }
        .login-box {
            background: rgba(10, 10, 30, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00f2ff;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        }

        /* LAYOUT PRINCIPAL */
        #main-profile {
            display: none;
            opacity: 0;
            z-index: 50;
            position: relative;
            display: flex;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
            gap: 40px;
            transition: opacity 1.5s;
        }

        /* SIDEBAR ESQUERDA */
        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            height: fit-content;
        }
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            border: 3px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* CONTEÚDO DIREITA (GALERIA) */
        #content-right {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            display: none; /* Oculto até clicar */
            overflow-y: auto;
            backdrop-filter: blur(10px);
            animation: fadeInRight 0.8s ease forwards;
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .galeria-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid rgba(0, 242, 255, 0.3);
            transition: 0.4s;
            cursor: pointer;
        }
        .galeria-grid img:hover {
            transform: scale(1.05);
            border-color: #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
        }

        /* BOTOES */
        .menu-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            cursor: pointer;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .menu-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }

        /* PLAYER CUSTOMIZADO */
        .player-card {
            margin-top: 30px;
            background: linear-gradient(145deg, rgba(0, 10, 30, 0.9), rgba(0, 40, 80, 0.4));
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.5);
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .player-card label { font-size: 0.7rem; color: #00f2ff; display: block; margin-bottom: 8px; letter-spacing: 2px; }
        
        .playlist-select {
            width: 100%;
            background: #000;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px;
            font-family: 'Roboto', sans-serif;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5) drop-shadow(0 0 5px #00f2ff);
        }

        .counter-box { position: fixed; bottom: 20px; right: 40px; color: #00f2ff; font-size: 0.7rem; opacity: 0.7; }
    </style>
</head>
<body onload="init()">

    <canvas id="star-canvas"></canvas>
    <canvas id="cursor-canvas"></canvas>

    <div id="login-screen">
        <div class="login-box">
            <h2>ACESSO GABRIEL</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()" style="padding: 12px 40px; cursor: pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 style="text-shadow: 0 0 15px #00f2ff; font-size: 1.2rem;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="toggleSection('amigos')">Amigos</button>
            <button class="menu-btn" onclick="toggleSection('fotos')">Fotos</button>

            <div id="amigos-list" style="display:none; font-size: 0.9rem; margin: 15px 0; text-align: left; background: rgba(0,242,255,0.1); padding: 10px; border-radius: 10px;">
                • Marbella<br>• Gold<br>• Venon<br>• Gothica<br>• Armando
            </div>

            <div class="player-card">
                <label>SISTEMA DE ÁUDIO</label>
                <select id="playlist" class="playlist-select" onchange="changeMusic()">
                    <option value="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1">Bon Jovi - Livin on a Prayer</option>
                    <option value="https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1">Desireless - Voyage Voyage</option>
                    <option value="https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=tawfqj0e&dl=1">Eminem - You Dont Know</option>
                    <option value="https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=hbwtvdvf&dl=1">Disturbed - Sound of Silence</option>
                </select>
                <audio id="bgMusic" controls loop>
                    <source src="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div id="content-right">
            <h3 id="right-title" style="color: #00f2ff; border-bottom: 1px solid #00f2ff; padding-bottom: 10px;">GALERIA</h3>
            <div id="fotos-grid" class="galeria-grid">
                <img src="https://imgur.com/Ip2Bdxv.png">
                <img src="https://imgur.com/7rKeKT8.png">
                <img src="https://imgur.com/Bx7jSbA.png">
                <img src="https://imgur.com/HhypJpx.png">
                <img src="https://imgur.com/sc5uVGA.png">
                <img src="https://imgur.com/ipooBns.png">
                <img src="https://imgur.com/pTlq477.png">
            </div>
        </div>

        <div class="counter-box">VISITAS: <span id="visitCount">0</span></div>
    </div>

    <script>
        let stars = [];
        let particles = [];
        let mouse = { x: -100, y: -100 };

        function init() {
            startStars();
            startCursorEffect();
        }

        // --- SISTEMA DE SEÇÕES ---
        function toggleSection(type) {
            const right = document.getElementById('content-right');
            const amigos = document.getElementById('amigos-list');
            
            if(type === 'fotos') {
                right.style.display = (right.style.display === 'block') ? 'none' : 'block';
                amigos.style.display = 'none';
            } else {
                amigos.style.display = (amigos.style.display === 'block') ? 'none' : 'block';
                right.style.display = 'none';
            }
        }

        // --- ESTRELAS ---
        function startStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i = 0; i < 300; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.4 + 0.1 });
            }
            function anim() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                stars.forEach(s => {
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                    s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
                });
                requestAnimationFrame(anim);
            }
            anim();
        }

        // --- MOUSE ---
        function startCursorEffect() {
            const canvas = document.getElementById('cursor-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
            function anim() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if(mouse.x > 0) particles.push({ x: mouse.x, y: mouse.y, size: Math.random()*3+1, spdX: (Math.random()-0.5)*2, spdY: (Math.random()-0.5)*2, alpha: 1 });
                for(let i=0; i<particles.length; i++){
                    let p = particles[i]; p.x += p.spdX; p.y += p.spdY; p.alpha -= 0.02;
                    if(p.alpha<=0) { particles.splice(i,1); i--; continue; }
                    ctx.fillStyle = `rgba(0, 242, 255, ${p.alpha})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                requestAnimationFrame(anim);
            }
            anim();
        }

        // --- LOGIN & UTIL ---
        function checkPass() {
            if (document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const main = document.getElementById('main-profile');
                    main.style.display = 'flex';
                    setTimeout(() => { main.style.opacity = '1'; document.getElementById('bgMusic').play(); }, 50);
                }, 1000);
                let v = (parseInt(localStorage.getItem('v_count')) || 0) + 1;
                localStorage.setItem('v_count', v);
                document.getElementById('visitCount').innerText = v;
            } else { alert("Senha incorreta!"); }
        }

        function changeMusic() {
            const audio = document.getElementById('bgMusic');
            audio.src = document.getElementById('playlist').value;
            audio.play();
        }

        window.onresize = () => { location.reload(); };
    </script>
</body>
</html>
