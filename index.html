<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
        }

        #star-canvas, #smoke-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #star-canvas { z-index: 1; }
        #smoke-canvas { z-index: 9999; } /* Fumaça por cima de tudo */

        /* --- TELA DE ENTRADA --- */
        #login-screen {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .login-box {
            background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px;
            border: 2px solid rgba(0, 242, 255, 0.4); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid #00f2ff;
            outline: none; background: rgba(0, 0, 0, 0.8); color: #00f2ff;
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
        }
        .btn-enter {
            padding: 12px 40px; background: #00f2ff; color: #000;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; box-shadow: 0 0 20px #00f2ff;
        }

        /* --- LAYOUT PRINCIPAL --- */
        #main-profile {
            display: none; opacity: 0; z-index: 50; position: relative;
            display: flex; height: 100vh; padding: 40px; box-sizing: border-box;
            gap: 40px; transition: opacity 1.5s;
        }

        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.5); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            height: fit-content;
        }
        .profile-pic {
            width: 180px; height: 180px; border-radius: 20px;
            border: 3px solid #00f2ff; box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            object-fit: cover; margin-bottom: 20px;
        }
        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: 2px solid #00f2ff; color: #00f2ff; cursor: pointer;
            border-radius: 10px; font-family: 'Orbitron', sans-serif;
            transition: 0.3s; font-size: 0.85rem;
        }
        .menu-btn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        /* --- INTERFACE ANIMADA (ESPAÇO VAZIO) --- */
        #profile-stats {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative;
        }
        .scanner-circle {
            width: 250px; height: 250px; border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%; position: relative;
            display: flex; justify-content: center; align-items: center;
            animation: pulse 4s infinite;
        }
        .scanner-circle::before {
            content: ''; width: 110%; height: 110%; border: 2px dashed #00f2ff;
            border-radius: 50%; position: absolute; animation: spin 10s linear infinite;
        }
        .scanner-data { text-align: left; color: #00f2ff; font-size: 0.8rem; margin-top: 30px; line-height: 1.6; }
        .glitch-text { animation: glitch 2s infinite; font-weight: bold; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px #00f2ff33; } 50% { box-shadow: 0 0 40px #00f2ff66; } }

        /* --- PAINEL DA DIREITA (QUANDO ATIVO) --- */
        #content-right {
            flex: 1; background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 25px;
            padding: 30px; display: none; overflow-y: auto;
            backdrop-filter: blur(10px); animation: fadeIn 0.5s ease;
        }
        .btn-voltar {
            background: rgba(255, 255, 255, 0.1); border: 1px solid #00f2ff;
            color: #00f2ff; padding: 8px 15px; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; margin-bottom: 20px; transition: 0.3s;
        }

        .player-card {
            margin-top: 30px; background: rgba(0, 0, 0, 0.9); padding: 15px;
            border-radius: 20px; border: 2px solid #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .playlist-select {
            width: 100%; background: #000; color: #00f2ff; border: 1px solid #00f2ff;
            padding: 8px; border-radius: 5px; margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
        }
        audio { width: 100%; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .counter-box { position: fixed; bottom: 25px; right: 40px; color: #00f2ff; font-size: 0.8rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="init()">

    <canvas id="star-canvas"></canvas>
    <canvas id="smoke-canvas"></canvas> <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center; cursor:zoom-out;">
        <img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border:3px solid #00f2ff; border-radius:15px; box-shadow:0 0 50px #00f2ff;">
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00f2ff;">LOGIN SYSTEM</h2>
            <input type="password" id="passInput" placeholder="ACCESS CODE">
            <br>
            <button class="btn-enter" onclick="checkPass()">ENTER</button>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 style="text-shadow: 0 0 15px #00f2ff; font-size: 1.3rem;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="openRight('sobre')">SOBRE MIM</button>
            <button class="menu-btn" onclick="openRight('amigos')">AMIGOS</button>
            <button class="menu-btn" onclick="openRight('fotos')">FOTOS</button>

            <div class="player-card">
                <select id="playlist" class="playlist-select" onchange="changeMusic()">
                    <option value="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1">Bon Jovi - Livin on a Prayer</option>
                    <option value="https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1">Desireless - Voyage Voyage</option>
                    <option value="https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=tawfqj0e&dl=1">Eminem - You Dont Know</option>
                    <option value="https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=hbwtvdvf&dl=1">Disturbed - Sound of Silence</option>
                </select>
                <audio id="bgMusic" controls loop>
                    <source src="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div id="profile-stats">
            <div class="scanner-circle">
                <div style="text-align: center;">
                    <span style="font-size: 0.6rem; color: #00f2ff; display: block;">SCANNING...</span>
                    <span class="glitch-text" style="font-size: 1.2rem; color: #fff;">WRS-DEV</span>
                </div>
            </div>
            <div class="scanner-data">
                > USER_ID: 1777777<br>
                > RANK: MAIN OWNER<br>
                > PARTNER: MNNA (1013) ❤️<br>
                > SYSTEM: PROTECTED / ENCRYPTED<br>
                > STATUS: ONLINE
            </div>
        </div>

        <div id="content-right">
            <button class="btn-voltar" onclick="closeRight()">← VOLTAR PARA A PÁGINA</button>
            <h2 id="right-title" style="color: #00f2ff; border-bottom: 1px solid #00f2ff33; padding-bottom: 10px; margin-top: 0;"></h2>
            <div id="right-body"></div>
        </div>

        <div class="counter-box">VISITAS: <span id="visitCount">0</span></div>
    </div>

    <script>
        let stars = [], mouse = { x: -100, y: -100 };
        let smokeParticles = [];

        function init() { startStars(); startSmokeEffect(); }

        function openRight(mode) {
            document.getElementById('profile-stats').style.display = 'none';
            const right = document.getElementById('content-right');
            const title = document.getElementById('right-title');
            const body = document.getElementById('right-body');
            right.style.display = "block";
            
            if(mode === 'sobre') {
                title.innerText = "SOBRE MIM";
                body.innerHTML = `<div style="color:#00f2ff; line-height:1.8;">Vendo Gifs, Pcback, Pstyle e Fundos para XAT, DJ nas horas vagas - <br>Married Mnna (1013) ❤️</div>`;
            } else if(mode === 'fotos') {
                title.innerText = "MINHAS FOTOS";
                body.innerHTML = `<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:10px;">
                    <img src="https://i.imgur.com/Ip2Bdxv.png" onclick="zoom(this.src)" style="width:100%; border:1px solid #00f2ff; cursor:pointer;">
                    <img src="https://i.imgur.com/7rKeKT8.png" onclick="zoom(this.src)" style="width:100%; border:1px solid #00f2ff; cursor:pointer;">
                    <img src="https://i.imgur.com/Bx7jSbA.png" onclick="zoom(this.src)" style="width:100%; border:1px solid #00f2ff; cursor:pointer;">
                </div>`;
            } else {
                title.innerText = "LISTA DE AMIGOS";
                body.innerHTML = `<div style="color:#00f2ff;">• Marbella<br>• Gold<br>• Venon<br>• Gothica<br>• Armando</div>`;
            }
        }

        function closeRight() {
            document.getElementById('content-right').style.display = 'none';
            document.getElementById('profile-stats').style.display = 'flex';
        }

        function zoom(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function startStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i = 0; i < 200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.3 });
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
                stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); s.y-=s.speed; if(s.y<0) s.y=canvas.height; });
                requestAnimationFrame(anim);
            } anim();
        }

        // --- NOVO EFEITO FUMAÇA ---
        function startSmokeEffect() {
            const canvas = document.getElementById('smoke-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;

            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX; mouse.y = e.clientY;
                // Cria múltiplas partículas de fumaça por movimento
                for(let i = 0; i < 3; i++) {
                    createSmokeParticle();
                }
            });

            class SmokeParticle {
                constructor(x, y) {
                    this.x = x + (Math.random() - 0.5) * 10;
                    this.y = y + (Math.random() - 0.5) * 10;
                    this.size = Math.random() * 5 + 5; // Tamanho inicial pequeno
                    this.maxSize = Math.random() * 40 + 20; // Tamanho máximo que expande
                    this.speedX = (Math.random() - 0.5) * 1;
                    this.speedY = (Math.random() - 0.5) * 1 - 0.5; // Sobe levemente
                    this.opacity = 0.5;
                    this.color = `0, 242, 255`; // Neon Blue
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    // Expande o tamanho suavemente
                    if (this.size < this.maxSize) {
                        this.size += 0.5;
                    }
                    // Diminui opacidade suavemente
                    this.opacity -= 0.005;
                }

                draw() {
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = `rgb(${this.color})`;
                    ctx.beginPath();
                    // Desenha um círculo suave (fumaça)
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function createSmokeParticle() {
                if(mouse.x > 0) {
                    smokeParticles.push(new SmokeParticle(mouse.x, mouse.y));
                }
            }

            function anim() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                for (let i = 0; i < smokeParticles.length; i++) {
                    smokeParticles[i].update();
                    smokeParticles[i].draw();
                    
                    // Remove partículas invisíveis
                    if (smokeParticles[i].opacity <= 0) {
                        smokeParticles.splice(i, 1);
                        i--;
                    }
                }
                ctx.globalAlpha = 1; // Reseta alpha global
                requestAnimationFrame(anim);
            } anim();
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-profile').style.display = 'flex';
                    setTimeout(() => { document.getElementById('main-profile').style.opacity = '1'; document.getElementById('bgMusic').play(); }, 50);
                }, 1000);
            } else { alert("ACCESS DENIED"); }
        }

        function changeMusic() {
            const audio = document.getElementById('bgMusic');
            audio.src = document.getElementById('playlist').value;
            audio.play();
        }

        window.onresize = () => { location.reload(); }; // Simplificado para resetar canvas corretamente
    </script>
</body>
</html>
