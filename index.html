<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        /* Lógica das cores aplicada sobre o seu estilo original */
        :root {
            --main-color: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
            cursor: default;
            
            /* SEGURANÇA: Impede a seleção de texto */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Padrão (Chrome, Opera, etc) */
        }

        /* --- SISTEMA DE SEGURANÇA (ESTILO) --- */
        #copyright-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 25px 50px; border-radius: 15px;
            font-weight: bold; z-index: 999999; display: none;
            box-shadow: 0 0 30px var(--main-color);
            text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; backdrop-filter: blur(10px);
        }

        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- TELA DE ENTRADA --- */
        #login-screen {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .login-box {
            background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px;
            border: 2px solid var(--main-color); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid var(--main-color);
            outline: none; background: rgba(0, 0, 0, 0.8); color: var(--main-color);
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
        }

        .btn-enter {
            padding: 12px 40px; background: var(--main-color); color: #000;
            border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; text-transform: uppercase;
            box-shadow: 0 0 20px var(--main-color);
            animation: neonPulse 1.5s infinite alternate;
            transition: 0.3s;
            backface-visibility: hidden;
        }

        @keyframes neonPulse {
            from { box-shadow: 0 0 10px var(--main-color), 0 0 20px var(--main-color); filter: brightness(1); }
            to { box-shadow: 0 0 30px var(--main-color), 0 0 50px var(--main-color); filter: brightness(1.4); }
        }

        .btn-enter:hover { animation: none; background: #fff; box-shadow: 0 0 60px var(--main-color); transform: scale(1.05); }

        /* --- LAYOUT PRINCIPAL --- */
        #main-profile {
            display: none; opacity: 0; z-index: 50; position: relative;
            display: flex; height: 100vh; padding: 40px; box-sizing: border-box;
            gap: 40px; transition: opacity 1.5s;
        }

        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            height: fit-content; position: relative; z-index: 70;
        }
        .profile-pic {
            width: 180px; height: 180px; border-radius: 20px;
            border: 3px solid var(--main-color); box-shadow: 0 0 25px var(--main-color);
            object-fit: cover; margin-bottom: 20px;
        }

        .animated-gradient-text {
            background: linear-gradient(to right, var(--main-color), #ffffff, var(--main-color));
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientShift 3s linear infinite;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            display: inline-block;
        }

        @keyframes gradientShift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: 2px solid var(--main-color); color: var(--main-color); cursor: pointer;
            border-radius: 10px; font-family: 'Orbitron', sans-serif;
            transition: 0.3s ease; font-size: 0.85rem;
        }
        .menu-btn:hover { background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 20px var(--main-color); transform: scale(1.05); }

        #ui-tools {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000001;
            display: none; gap: 10px; align-items: flex-end;
        }

        #visit-counter {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main-color);
            padding: 6px 12px; border-radius: 4px; display: flex;
            flex-direction: column; align-items: center;
        }

        .color-btn {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main-color);
            color: var(--main-color); padding: 8px 12px; border-radius: 4px;
            cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 10px;
            font-weight: bold; transition: 0.3s;
        }
        .color-btn:hover { background: var(--main-color); color: #000; }

        .slider-container {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }
        .slideshow {
            width: 100%; height: 400px; position: relative;
            perspective: 1000px; display: flex; justify-content: center; align-items: center;
        }
        .slide-img {
            position: absolute; width: 280px; height: 380px;
            object-fit: cover; border-radius: 15px; border: 2px solid var(--main-color);
            box-shadow: 0 0 30px var(--main-color);
            transition: all 0.8s ease-in-out; opacity: 0;
        }
        .slide-img.active { opacity: 1; transform: translateZ(100px); z-index: 5; }
        .slide-img.prev { opacity: 0.4; transform: translateX(-250px) rotateY(25deg) scale(0.8); z-index: 2; }
        .slide-img.next { opacity: 0.4; transform: translateX(250px) rotateY(-25deg) scale(0.8); z-index: 2; }

        .player-card { margin-top: 30px; background: rgba(5, 5, 15, 0.9); padding: 15px; border-radius: 15px; border: 1px solid var(--main-color); }
        .track-info { font-size: 0.65rem; color: var(--main-color); margin-bottom: 10px; text-transform: uppercase; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 15px; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: var(--main-color); box-shadow: 0 0 8px var(--main-color); }
        .volume-slider { -webkit-appearance: none; width: 60%; height: 3px; background: rgba(0, 242, 255, 0.3); outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--main-color); border-radius: 50%; cursor: pointer; }

        #content-right {
            flex: 1; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 30px; display: none; overflow-y: auto;
            backdrop-filter: blur(10px); animation: fadeIn 0.5s ease;
            position: absolute; right: 40px; top: 40px; bottom: 40px; left: 400px; z-index: 60;
        }

        .header-right { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 20px; }
        .galeria-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .galeria-grid img { width: 100%; border: 1px solid var(--main-color); border-radius: 8px; transition: 0.4s ease; cursor: zoom-in; }
        .galeria-grid img:hover { border-color: #fff; transform: scale(1.08); box-shadow: 0 0 15px var(--main-color); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="init()">

    <div id="copyright-alert">Copyright - Acesso Proibido</div>

    <canvas id="star-canvas"></canvas>

    <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:15000; justify-content:center; align-items:center;">
        <img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border:2px solid var(--main-color); border-radius:10px;">
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--main-color);">LOGIN</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="ui-tools">
        <button class="color-btn" onclick="changeTheme()">🎨 COR</button>
        <div id="visit-counter">
            <span style="color: var(--main-color); font-size: 8px; letter-spacing: 1px;">VISITAS</span>
            <span id="count-number" style="color: #fff; font-size: 18px; font-family: monospace;">...</span>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 class="animated-gradient-text" style="font-size: 1.2rem;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="openRight('sobre')">SOBRE MIM</button>
            <button class="menu-btn" onclick="openRight('amigos')">AMIGOS</button>
            <button class="menu-btn" onclick="openRight('fotos')">FOTOS</button>

            <div class="player-card">
                <div class="track-info" id="trackName">Carregando...</div>
                <div class="progress-container" onclick="seek(event)">
                    <div class="progress-bar" id="progBar"></div>
                </div>
                <div style="display:flex; justify-content:space-around; margin-bottom:10px;">
                    <button class="btn-enter" style="padding:5px 10px; animation: none;" onclick="prevTrack()">⏮</button>
                    <button class="btn-enter" style="padding:5px 10px; animation: none;" id="playBtn" onclick="togglePlay()">⏸</button>
                    <button class="btn-enter" style="padding:5px 10px; animation: none;" onclick="nextTrack()">⏭</button>
                </div>
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="setVolume(this.value)">
                <audio id="bgMusic" loop ontimeupdate="updateProgress()"></audio>
            </div>
        </div>

        <div class="slider-container" id="center-slider">
            <h3 class="animated-gradient-text" style="margin-bottom: 30px; letter-spacing: 5px;">PROJETOS & DESTAQUES</h3>
            <div class="slideshow" id="slide-wrap"></div>
        </div>

        <div id="content-right">
            <div class="header-right">
                <button class="btn-enter" style="padding:8px 15px; animation: none;" onclick="closeRight()">← VOLTAR</button>
                <h2 id="right-title" class="animated-gradient-text" style="padding-bottom: 10px; width: 100%; margin-top: 20px;"></h2>
            </div>
            <div id="right-body"></div>
        </div>
    </div>

    <script>
        // --- SISTEMA DE SEGURANÇA (JS) ---
        function mostrarAviso() {
            const aviso = document.getElementById('copyright-alert');
            aviso.style.display = 'block';
            setTimeout(() => { aviso.style.display = 'none'; }, 2000);
        }
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); mostrarAviso(); });
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'c' || e.key === 'C' || e.key === 's' || e.key === 'S' || e.key === 'i' || e.key === 'I')) {
                e.preventDefault(); mostrarAviso();
            }
        });

        const ID_VISITAS = "perfil_gabriel_2026_unique"; 
        const cores = ["#00f2ff", "#ff0000", "#ffff00", "#00ff00", "#ff00ff", "#ff8800", "#ffffff"];
        let corIndex = 0;

        function changeTheme() {
            corIndex = (corIndex + 1) % cores.length;
            document.documentElement.style.setProperty('--main-color', cores[corIndex]);
        }

        let stars = [];
        const fotosGaleria = [
            "https://i.imgur.com/Ip2Bdxv.png", "https://i.imgur.com/7rKeKT8.png", 
            "https://i.imgur.com/Bx7jSbA.png", "https://i.imgur.com/HhypJpx.png", 
            "https://i.imgur.com/sc5uVGA.png", "https://i.imgur.com/ipooBns.png", 
            "https://i.imgur.com/pTlq477.png"
        ];
        const playlist = [
        { name: "Eminem - You dont know", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684282887639140/Eminem-you-dont-know.mp3.mp3?ex=69d73eda&is=69d5ed5a&hm=ed020c05ff12ac429b5329d8d76a87dfb4cb913bb84c1c63e95a55601888e9c2&" },
        { name: "The Sound of Silence – Rising to the Night", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684333672403135/sound-of-silence.mp3.mp3?ex=69d73ee6&is=69d5ed66&hm=3aacc36f062b5a9d803e187d8905efa1fdc3f8f0566bf5a5e6fb542e26dd5076&" },
        { name: "Desireless - Voyage Voyage", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684260460822640/Desireless-voyage-voyage.mp3.mp3?ex=69d73ed4&is=69d5ed54&hm=c0cf049750dc9464d0e86caa7a9042a01f9bce3be05117c7b956c8934302dde3&" }
    ];
        let currentTrack = 0;
        const audio = document.getElementById('bgMusic');

        function init() { 
            startStars(); 
            setupSlider();
            audio.src = playlist[currentTrack].url;
            document.getElementById('trackName').innerText = playlist[currentTrack].name;
        }

        async function carregarContadores() {
            try {
                const resV = await fetch(`https://api.counterapi.dev/v1/wrs-galeria/${ID_VISITAS}/up`);
                const dataV = await resV.json();
                document.getElementById('count-number').innerText = dataV.count || dataV.value;
            } catch(e) { document.getElementById('count-number').innerText = "1"; }
        }

        function setupSlider() {
            const wrap = document.getElementById('slide-wrap');
            fotosGaleria.forEach((src) => {
                const img = document.createElement('img');
                img.src = src; img.className = 'slide-img';
                wrap.appendChild(img);
            });
            let idx = 0;
            const slides = document.querySelectorAll('.slide-img');
            function updateSlider() {
                slides.forEach(s => s.className = 'slide-img');
                if(slides[idx]) {
                    const prev = (idx - 1 + slides.length) % slides.length;
                    const next = (idx + 1) % slides.length;
                    slides[idx].classList.add('active');
                    slides[prev].classList.add('prev');
                    slides[next].classList.add('next');
                    idx = (idx + 1) % slides.length;
                }
            }
            updateSlider(); setInterval(updateSlider, 3000);
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(); }
        function loadTrack() {
            audio.src = playlist[currentTrack].url;
            document.getElementById('trackName').innerText = playlist[currentTrack].name;
            audio.play(); document.getElementById('playBtn').innerText = "⏸";
        }
        function updateProgress() { document.getElementById('progBar').style.width = (audio.currentTime / audio.duration) * 100 + "%"; }
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
        function setVolume(v) { audio.volume = v; }

        function openRight(mode) {
            const rightTitle = document.getElementById('right-title');
            const body = document.getElementById('right-body');
            document.getElementById('content-right').style.display = "block";
            document.getElementById('center-slider').style.visibility = "hidden";
            if(mode === 'sobre') {
                rightTitle.innerText = "SOBRE MIM";
                body.innerHTML = `<div style="color:var(--main-color); line-height:1.8;">Vendo Gifs, Pcback, Pstyle e Fundos para XAT, DJ nas horas vagas - <br>Married Mnna (1013) ❤️</div>`;
            } else if(mode === 'fotos') {
                rightTitle.innerText = "MINHAS FOTOS";
                let gridHTML = `<div class="galeria-grid">`;
                fotosGaleria.forEach(src => { gridHTML += `<img src="${src}" onclick="zoom(this.src)">`; });
                gridHTML += `</div>`;
                body.innerHTML = gridHTML;
            } else {
                rightTitle.innerText = "LISTA DE AMIGOS";
                body.innerHTML = `<div style="color:var(--main-color);">• Marbella<br>• Gold<br>• Venon<br>• Gothica<br>• Armando</div>`;
            }
        }
        function closeRight() { 
            document.getElementById('content-right').style.display='none'; 
            document.getElementById('center-slider').style.visibility = "visible";
        }
        function zoom(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').style.display='flex'; }

        function startStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.2});
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
                stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); s.y-=s.speed; if(s.y<0) s.y=canvas.height; });
                requestAnimationFrame(anim);
            } anim();
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-profile').style.display='flex';
                    document.getElementById('ui-tools').style.display='flex';
                    carregarContadores();
                    setTimeout(() => { document.getElementById('main-profile').style.opacity='1'; audio.play(); }, 50);
                }, 1000);
            } else { alert("Senha incorreta!"); }
        }
    </script>
</body>
</html>
