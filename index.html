<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WRS Galeria - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        :root { --main-color: #00f2ff; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* --- COPYRIGHT ALERT --- */
        #copyright-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 25px 50px; border-radius: 15px;
            font-weight: bold; z-index: 999999; display: none;
            box-shadow: 0 0 30px var(--main-color);
            text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; backdrop-filter: blur(10px);
        }

        /* --- BACKGROUND & EFFECTS --- */
        .light-effect-layer {
            position: fixed; top: -150%; left: -150%; width: 400%; height: 400%;
            background: linear-gradient(135deg, transparent 42%, var(--main-color) 49%, #ffffff 50%, var(--main-color) 51%, transparent 58%);
            animation: lightSweep 12s linear infinite; pointer-events: none; 
            z-index: -1; opacity: 0.3; filter: blur(60px);
        }
        @keyframes lightSweep {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(360deg); }
        }
        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; z-index: 1000; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .login-box {
            background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px;
            border: 2px solid var(--main-color); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid var(--main-color);
            outline: none; background: rgba(0, 0, 0, 0.8); color: var(--main-color);
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
        }

        /* --- LAYOUT --- */
        #main-profile {
            display: none; opacity: 0; z-index: 50; position: relative;
            display: flex; height: 100vh; padding: 40px; box-sizing: border-box;
            gap: 40px; transition: opacity 1.5s;
        }
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            height: fit-content; position: relative; z-index: 70;
        }
        .profile-pic { width: 180px; height: 180px; border-radius: 20px; border: 3px solid var(--main-color); box-shadow: 0 0 25px var(--main-color); object-fit: cover; margin-bottom: 20px; }
        
        .animated-gradient-text {
            background: linear-gradient(to right, var(--main-color), #ffffff, var(--main-color));
            background-size: 200% auto; color: transparent;
            -webkit-background-clip: text; background-clip: text;
            animation: gradientShift 3s linear infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: 2px solid var(--main-color); color: var(--main-color); cursor: pointer;
            border-radius: 10px; font-family: 'Orbitron', sans-serif; transition: 0.3s;
        }
        .menu-btn:hover { background: rgba(0, 242, 255, 0.1); transform: scale(1.05); }

        /* --- PLAYER --- */
        .player-card { margin-top: 30px; background: rgba(5, 5, 15, 0.9); padding: 15px; border-radius: 15px; border: 1px solid var(--main-color); }
        .progress-bar { width: 0%; height: 100%; background: var(--main-color); box-shadow: 0 0 8px var(--main-color); transition: width 0.1s linear; }

        /* --- SLIDER & CONTENT --- */
        .slider-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .slideshow { width: 100%; height: 400px; position: relative; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        .slide-img { position: absolute; width: 280px; height: 380px; object-fit: cover; border-radius: 15px; border: 2px solid var(--main-color); transition: all 0.8s ease; opacity: 0; }
        .slide-img.active { opacity: 1; transform: translateZ(100px); z-index: 5; box-shadow: 0 0 30px var(--main-color); }
        .slide-img.prev { opacity: 0.4; transform: translateX(-250px) rotateY(25deg) scale(0.8); }
        .slide-img.next { opacity: 0.4; transform: translateX(250px) rotateY(-25deg) scale(0.8); }

        #content-right {
            flex: 1; background: rgba(0, 0, 0, 0.85); border: 1px solid var(--main-color);
            border-radius: 25px; padding: 30px; display: none; overflow-y: auto;
            position: absolute; right: 40px; top: 40px; bottom: 40px; left: 400px; z-index: 60;
        }

        #ui-tools { position: fixed; bottom: 20px; right: 20px; z-index: 10001; display: none; gap: 10px; }
        #visit-counter { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main-color); padding: 6px 12px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div id="copyright-alert">Copyright - Acesso Proibido</div>
    <div class="light-effect-layer"></div>
    <canvas id="star-canvas"></canvas>

    <div id="login-screen">
        <div class="login-box">
            <h2 class="animated-gradient-text">PAINEL WRS</h2>
            <input type="password" id="passInput" placeholder="DIGITE A SENHA">
            <br>
            <button class="menu-btn" style="width: auto; padding: 10px 40px;" onclick="checkPass()">ACESSAR</button>
        </div>
    </div>

    <div id="ui-tools">
        <div id="visit-counter">
            <span style="color: var(--main-color); font-size: 8px; letter-spacing: 2px;">ONLINE</span>
            <span id="count-number" style="color: #fff; font-size: 18px; font-family: monospace;">...</span>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 class="animated-gradient-text" style="font-size: 1.2rem;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="openRight('sobre')">PERFIL</button>
            <button class="menu-btn" onclick="openRight('amigos')">AMIGOS</button>
            <button class="menu-btn" onclick="openRight('fotos')">GALERIA</button>

            <div class="player-card">
                <div id="trackName" style="font-size: 9px; color: var(--main-color); margin-bottom: 10px; text-transform: uppercase;">Música</div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:15px; cursor:pointer;" onclick="seek(event)">
                    <div class="progress-bar" id="progBar"></div>
                </div>
                <div style="display:flex; justify-content:space-around;">
                    <button class="menu-btn" style="padding:5px; margin:0; border:none;" onclick="prevTrack()">⏮</button>
                    <button class="menu-btn" style="padding:5px; margin:0; border:none;" id="playBtn" onclick="togglePlay()">⏸</button>
                    <button class="menu-btn" style="padding:5px; margin:0; border:none;" onclick="nextTrack()">⏭</button>
                </div>
                <audio id="bgMusic" loop ontimeupdate="updateProgress()"></audio>
            </div>
        </div>

        <div class="slider-container" id="center-slider">
            <h3 class="animated-gradient-text" style="letter-spacing: 8px; font-size: 14px;">WRS PROJECTS</h3>
            <div class="slideshow" id="slide-wrap"></div>
        </div>

        <div id="content-right">
            <button class="menu-btn" style="width:auto; padding:5px 20px;" onclick="closeRight()">VOLTAR</button>
            <h2 id="right-title" class="animated-gradient-text" style="margin-top: 25px; border-bottom: 1px solid var(--main-color); padding-bottom: 10px;"></h2>
            <div id="right-body" style="margin-top: 20px; line-height: 1.6;"></div>
        </div>
    </div>

    <script>
        // --- SEGURANÇA ---
        function mostrarAviso() {
            const aviso = document.getElementById('copyright-alert');
            aviso.style.display = 'block';
            setTimeout(() => { aviso.style.display = 'none'; }, 2000);
        }
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); mostrarAviso(); });
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'c' || e.key === 'C' || e.key === 's' || e.key === 'S' || e.key === 'i' || e.key === 'I')) {
                e.preventDefault(); mostrarAviso();
            }
        });

        // --- DADOS E FUNÇÕES ---
        const ID_VISITAS = "perfil_gabriel_2026_unique";
        const fotosGaleria = ["https://i.imgur.com/Ip2Bdxv.png", "https://i.imgur.com/7rKeKT8.png", "https://i.imgur.com/Bx7jSbA.png", "https://i.imgur.com/HhypJpx.png", "https://i.imgur.com/sc5uVGA.png", "https://i.imgur.com/ipooBns.png", "https://i.imgur.com/pTlq477.png"];
        const playlist = [
            { name: "Bon Jovi - Prayer", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" },
            { name: "Desireless - Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1" }
        ];
        let currentTrack = 0;
        const audio = document.getElementById('bgMusic');

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-profile').style.display='flex';
                    document.getElementById('ui-tools').style.display='flex';
                    carregarContadores();
                    setTimeout(() => { document.getElementById('main-profile').style.opacity='1'; audio.play(); }, 50);
                }, 1000);
            } else alert("Senha incorreta!");
        }

        function carregarContadores() {
            fetch(`https://api.counterapi.dev/v1/wrs_galeria/${ID_VISITAS}/up`)
                .then(res => res.json()).then(res => { document.getElementById('count-number').innerText = res.count; });
        }

        function openRight(mode) {
            const body = document.getElementById('right-body');
            const title = document.getElementById('right-title');
            document.getElementById('content-right').style.display = "block";
            document.getElementById('center-slider').style.visibility = "hidden";
            
            if(mode==='sobre') {
                title.innerText="PERFIL PROFISSIONAL";
                body.innerHTML="<p><b>Nome:</b> Gabriel Leandro (WRS)</p><p><b>Especialidade:</b> Design de Gifs, Pcbacks, Pstyles e Interfaces para Xat.</p><p><b>Foco:</b> Criação de layouts exclusivos e scripts de proteção para chats e perfis.</p>";
            } else if(mode==='amigos') {
                title.innerText="NETWORK / AMIGOS";
                body.innerHTML="<div style='display:grid; grid-template-columns: 1fr 1fr; gap: 10px;'><span>⭐ Marbella</span><span>⭐ Gold</span><span>⭐ Venon</span><span>⭐ Gothica</span><span>⭐ Mnna</span><span>⭐ Armando</span><span>⭐ Promise</span><span>⭐ Marbella</span></div>";
            } else {
                title.innerText="GALERIA DE PROJETOS";
                body.innerHTML = "<div style='display:flex; flex-wrap:wrap; gap:10px;'>" + fotosGaleria.map(s => `<img src="${s}" style="width:120px; height:150px; object-fit:cover; border:1px solid var(--main-color); border-radius:8px;">`).join('') + "</div>";
            }
        }

        function closeRight() { document.getElementById('content-right').style.display='none'; document.getElementById('center-slider').style.visibility="visible"; }

        function init() { 
            setupSlider(); 
            audio.src = playlist[currentTrack].url;
            document.getElementById('trackName').innerText = playlist[currentTrack].name;
        }

        function setupSlider() {
            const wrap = document.getElementById('slide-wrap');
            fotosGaleria.slice(0,4).forEach(src => { const img = document.createElement('img'); img.src = src; img.className = 'slide-img'; wrap.appendChild(img); });
            let idx = 0; const slides = document.querySelectorAll('.slide-img');
            function update() {
                slides.forEach(s => s.className = 'slide-img');
                if(slides[idx]) {
                    slides[idx].classList.add('active');
                    slides[(idx-1+slides.length)%slides.length].classList.add('prev');
                    slides[(idx+1)%slides.length].classList.add('next');
                    idx = (idx+1)%slides.length;
                }
            }
            update(); setInterval(update, 4000);
        }

        function togglePlay() { audio.paused ? (audio.play(), document.getElementById('playBtn').innerText="⏸") : (audio.pause(), document.getElementById('playBtn').innerText="▶"); }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(); }
        function loadTrack() { audio.src = playlist[currentTrack].url; document.getElementById('trackName').innerText = playlist[currentTrack].name; audio.play(); }
        function updateProgress() { document.getElementById('progBar').style.width = (audio.currentTime / audio.duration) * 100 + "%"; }
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
    </script>
</body>
</html>
