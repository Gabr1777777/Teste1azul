<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        #star-canvas, #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #star-canvas { z-index: 1; }
        #cursor-canvas { z-index: 9999; }

        #login-screen {
            position: fixed;
            z-index: 100;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .login-box {
            background: rgba(10, 10, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(0, 242, 255, 0.4);
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        input[type="password"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #00f2ff;
            outline: none;
            background: rgba(0, 0, 0, 0.8);
            color: #00f2ff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        .btn-enter {
            padding: 12px 40px;
            background: #00f2ff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00f2ff;
        }

        #main-profile {
            display: none;
            opacity: 0;
            z-index: 50;
            position: relative;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
            transition: opacity 1.5s ease;
        }

        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            border: 3px solid #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            object-fit: cover;
            margin-bottom: 20px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            cursor: pointer;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
        }

        .hidden-content {
            display: none;
            background: rgba(0, 242, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            border-left: 3px solid #00f2ff;
        }

        .galeria-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .galeria-preview img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #00f2ff;
        }

        /* Playlist Style */
        .playlist-select {
            width: 100%;
            background: #000;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            margin-top: 10px;
            padding: 5px;
            font-size: 0.8rem;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.8);
        }

        .counter-box {
            position: fixed;
            bottom: 25px;
            right: 40px;
            color: #00f2ff;
            font-size: 0.8rem;
        }
    </style>
</head>
<body onload="init()">

    <canvas id="star-canvas"></canvas>
    <canvas id="cursor-canvas"></canvas>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00f2ff;">LOGIN</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 style="text-shadow: 0 0 15px #00f2ff;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="toggleElement('amigos-list')">AMIGOS</button>
            <div id="amigos-list" class="hidden-content">
                • Marbella<br>• Gold<br>• Venon<br>• Gothica<br>• Armando
            </div>

            <button class="menu-btn" onclick="toggleElement('fotos-box')">FOTOS</button>
            <div id="fotos-box" class="hidden-content">
                <div class="galeria-preview">
                    <img src="https://i.imgur.com/Ip2Bdxv.png">
                    <img src="https://i.imgur.com/7rKeKT8.png">
                    <img src="https://i.imgur.com/Bx7jSbA.png">
                    <img src="https://i.imgur.com/HhypJpx.png">
                    <img src="https://i.imgur.com/sc5uVGA.png">
                    <img src="https://i.imgur.com/ipooBns.png">
                    <img src="https://i.imgur.com/pTlq477.png">
                </div>
            </div>

            <div style="margin-top:20px; border-top: 1px solid #00f2ff33; padding-top:10px;">
                <label style="font-size: 0.7rem; color: #00f2ff;">PLAYLIST:</label>
                <select id="playlist" class="playlist-select" onchange="changeMusic()">
                    <option value="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1">Bon Jovi - Livin on a Prayer</option>
                    <option value="https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1">Desireless - Voyage Voyage</option>
                    <option value="https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=tawfqj0e&dl=1">Eminem - You Dont Know</option>
                    <option value="https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=hbwtvdvf&dl=1">Disturbed - Sound of Silence</option>
                </select>
                <audio id="bgMusic" controls loop>
                    <source src="https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="counter-box">
            VISITAS: <span id="visitCount">0</span>
        </div>
    </div>

    <script>
        let stars = [];
        let particles = [];
        let mouse = { x: -100, y: -100 };

        function init() {
            startStars();
            startCursorEffect();
        }

        // --- ESTRELAS ---
        function startStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i = 0; i < 300; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.4 + 0.1 });
            }
            function animateStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                stars.forEach(s => {
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
                    s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
                });
                requestAnimationFrame(animateStars);
            }
            animateStars();
        }

        // --- EFEITO DO MOUSE (PARTÍCULAS) ---
        function startCursorEffect() {
            const canvas = document.getElementById('cursor-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

            function createParticle() {
                if (mouse.x > 0) {
                    particles.push({ x: mouse.x, y: mouse.y, size: Math.random() * 4 + 1, spdX: (Math.random()-0.5)*2, spdY: (Math.random()-0.5)*2, alpha: 1 });
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                createParticle();
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x += p.spdX; p.y += p.spdY; p.alpha -= 0.02;
                    if (p.alpha <= 0) { particles.splice(i, 1); i--; continue; }
                    ctx.fillStyle = `rgba(0, 242, 255, ${p.alpha})`;
                    ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff";
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }

        // --- LOGICA ---
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if (pass === "1009") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-profile').style.display = 'block';
                    setTimeout(() => { document.getElementById('main-profile').style.opacity = '1'; document.getElementById('bgMusic').play(); }, 50);
                }, 1000);
                initCounter();
            } else { alert("Senha incorreta!"); }
        }

        function changeMusic() {
            const select = document.getElementById('playlist');
            const audio = document.getElementById('bgMusic');
            audio.src = select.value;
            audio.play();
        }

        function toggleElement(id) {
            const el = document.getElementById(id);
            const isVisible = (el.style.display === 'block');
            document.querySelectorAll('.hidden-content').forEach(item => item.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function initCounter() {
            let v = localStorage.getItem('v_count') || 0;
            v++; localStorage.setItem('v_count', v);
            document.getElementById('visitCount').innerText = v;
        }

        window.onresize = () => { location.reload(); };
    </script>
</body>
</html>
