<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
        }

        #star-canvas, #smoke-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #star-canvas { z-index: 1; }
        #smoke-canvas { z-index: 9999; }

        /* --- TELA DE ENTRADA (RESTAURADA) --- */
        #login-screen {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .login-box {
            background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px;
            border: 2px solid rgba(0, 242, 255, 0.4); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid #00f2ff;
            outline: none; background: rgba(0, 0, 0, 0.8); color: #00f2ff;
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
        }
        .btn-enter {
            padding: 12px 40px; background: #00f2ff; color: #000;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; box-shadow: 0 0 20px #00f2ff;
        }

        /* --- LAYOUT PRINCIPAL --- */
        #main-profile {
            display: none; opacity: 0; z-index: 50; position: relative;
            display: flex; height: 100vh; padding: 40px; box-sizing: border-box;
            gap: 40px; transition: opacity 1.5s;
        }

        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.5); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            height: fit-content;
        }
        .profile-pic {
            width: 180px; height: 180px; border-radius: 20px;
            border: 3px solid #00f2ff; box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            object-fit: cover; margin-bottom: 20px;
        }
        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: 2px solid #00f2ff; color: #00f2ff; cursor: pointer;
            border-radius: 10px; font-family: 'Orbitron', sans-serif;
            transition: 0.3s; font-size: 0.85rem;
        }
        .menu-btn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        /* --- PLAYER SUPER PROFISSIONAL --- */
        .player-card {
            margin-top: 30px; background: rgba(5, 5, 15, 0.9); padding: 15px;
            border-radius: 15px; border: 1px solid #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .track-info { font-size: 0.65rem; color: #00f2ff; margin-bottom: 10px; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 15px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: #00f2ff; border-radius: 2px; box-shadow: 0 0 10px #00f2ff; transition: width 0.1s linear; }
        .player-controls { display: flex; justify-content: space-around; align-items: center; }
        .ctrl-btn { background: none; border: none; color: #00f2ff; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .ctrl-btn:hover { transform: scale(1.2); text-shadow: 0 0 10px #00f2ff; }

        /* --- INTERFACE CENTRAL --- */
        #profile-stats { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .scanner-circle {
            width: 250px; height: 250px; border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center;
            animation: pulse 4s infinite;
        }
        .scanner-circle::before {
            content: ''; width: 110%; height: 110%; border: 2px dashed #00f2ff;
            border-radius: 50%; position: absolute; animation: spin 10s linear infinite;
        }

        /* --- PAINEL DA DIREITA --- */
        #content-right {
            flex: 1; background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 25px;
            padding: 30px; display: none; overflow-y: auto;
            backdrop-filter: blur(10px); animation: fadeIn 0.5s ease;
        }
        .btn-voltar {
            background: rgba(255, 255, 255, 0.1); border: 1px solid #00f2ff;
            color: #00f2ff; padding: 8px 15px; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; margin-bottom: 20px;
        }

        .galeria-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .galeria-grid img { width: 100%; border: 1px solid #00f2ff33; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .galeria-grid img:hover { border-color: #00f2ff; transform: translateY(-5px); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px #00f2ff22; } 50% { box-shadow: 0 0 30px #00f2ff44; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="init()">

    <canvas id="star-canvas"></canvas>
    <canvas id="smoke-canvas"></canvas>

    <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center;">
        <img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border:2px solid #00f2ff; border-radius:10px;">
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00f2ff;">LOGIN</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 style="text-shadow: 0 0 15px #00f2ff; font-size: 1.2rem;">Gabriel Leandro</h2>
            
            <button class="menu-btn" onclick="openRight('sobre')">SOBRE MIM</button>
            <button class="menu-btn" onclick="openRight('amigos')">AMIGOS</button>
            <button class="menu-btn" onclick="openRight('fotos')">FOTOS</button>

            <div class="player-card">
                <div class="track-info" id="trackName">Bon Jovi - Livin on a Prayer</div>
                <div class="progress-container" onclick="seek(event)">
                    <div class="progress-bar" id="progBar"></div>
                </div>
                <div class="player-controls">
                    <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
                    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">⏸</button>
                    <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
                </div>
                <audio id="bgMusic" loop ontimeupdate="updateProgress()"></audio>
            </div>
        </div>

        <div id="profile-stats">
            <div class="scanner-circle">
                <div style="text-align: center;">
                    <span style="font-size: 0.6rem; color: #00f2ff; display: block;">SCANNING...</span>
                    <span style="font-size: 1rem; color: #fff;">WRS-SYSTEM</span>
                </div>
            </div>
            <div style="text-align: left; color: #00f2ff; font-size: 0.8rem; margin-top: 30px; line-height: 1.6;">
                > USER_ID: 1777777<br>
                > RANK: MAIN OWNER<br>
                > PARTNER: MNNA (1013) ❤️<br>
                > STATUS: ONLINE
            </div>
        </div>

        <div id="content-right">
            <button class="btn-voltar" onclick="closeRight()">← VOLTAR PARA A PÁGINA</button>
            <h2 id="right-title" style="color: #00f2ff; border-bottom: 1px solid #00f2ff33; padding-bottom: 10px; margin-top: 0;"></h2>
            <div id="right-body"></div>
        </div>
    </div>

    <script>
        let stars = [], smokeParticles = [], mouse = { x: -100, y: -100 };
        const playlist = [
            { name: "Bon Jovi - Livin on a Prayer", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1" },
            { name: "Eminem - You Dont Know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=tawfqj0e&dl=1" },
            { name: "Disturbed - Sound of Silence", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=hbwtvdvf&dl=1" }
        ];
        let currentTrack = 0;
        const audio = document.getElementById('bgMusic');

        function init() { startStars(); startSmokeEffect(); audio.src = playlist[currentTrack].url; }

        // --- FUNÇÕES DO PLAYER ---
        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(); }
        function loadTrack() {
            audio.src = playlist[currentTrack].url;
            document.getElementById('trackName').innerText = playlist[currentTrack].name;
            audio.play(); document.getElementById('playBtn').innerText = "⏸";
        }
        function updateProgress() {
            const bar = document.getElementById('progBar');
            const percent = (audio.currentTime / audio.duration) * 100;
            bar.style.width = percent + "%";
        }
        function seek(e) {
            const container = e.currentTarget;
            const percent = e.offsetX / container.offsetWidth;
            audio.currentTime = percent * audio.duration;
        }

        // --- INTERFACE ---
        function openRight(mode) {
            document.getElementById('profile-stats').style.display = 'none';
            const right = document.getElementById('content-right');
            const body = document.getElementById('right-body');
            right.style.display = "block";
            
            if(mode === 'sobre') {
                document.getElementById('right-title').innerText = "SOBRE MIM";
                body.innerHTML = `<div style="color:#00f2ff; line-height:1.8;">Vendo Gifs, Pcback, Pstyle e Fundos para XAT, DJ nas horas vagas - <br>Married Mnna (1013) ❤️</div>`;
            } else if(mode === 'fotos') {
                document.getElementById('right-title').innerText = "MINHAS FOTOS";
                body.innerHTML = `<div class="galeria-grid">
                    <img src="https://i.imgur.com/Ip2Bdxv.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/7rKeKT8.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/Bx7jSbA.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/HhypJpx.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/sc5uVGA.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/ipooBns.png" onclick="zoom(this.src)">
                    <img src="https://i.imgur.com/pTlq477.png" onclick="zoom(this.src)">
                </div>`;
            } else {
                document.getElementById('right-title').innerText = "LISTA DE AMIGOS";
                body.innerHTML = `<div style="color:#00f2ff;">• Marbella<br>• Gold<br>• Venon<br>• Gothica<br>• Armando</div>`;
            }
        }
        function closeRight() { document.getElementById('content-right').style.display='none'; document.getElementById('profile-stats').style.display='flex'; }
        function zoom(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').style.display='flex'; }

        // --- EFEITOS ---
        function startStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2, speed:Math.random()*0.3});
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
                stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); s.y-=s.speed; if(s.y<0) s.y=canvas.height; });
                requestAnimationFrame(anim);
            } anim();
        }

        function startSmokeEffect() {
            const canvas = document.getElementById('smoke-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; for(let i=0; i<2; i++) smokeParticles.push(new Smoke(mouse.x, mouse.y)); });
            class Smoke {
                constructor(x,y) { this.x=x; this.y=y; this.size=Math.random()*5+2; this.op=0.5; this.vx=(Math.random()-0.5)*1; this.vy=(Math.random()-0.5)*1-0.5; }
                update() { this.x+=this.vx; this.y+=this.vy; this.size+=0.4; this.op-=0.008; }
                draw() { ctx.globalAlpha=this.op; ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
            }
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                for(let i=0; i<smokeParticles.length; i++) {
                    smokeParticles[i].update(); smokeParticles[i].draw();
                    if(smokeParticles[i].op<=0) { smokeParticles.splice(i,1); i--; }
                } requestAnimationFrame(anim);
            } anim();
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-profile').style.display='flex';
                    setTimeout(() => { document.getElementById('main-profile').style.opacity='1'; audio.play(); }, 50);
                }, 1000);
            } else { alert("Senha incorreta!"); }
        }
        window.onresize = () => { location.reload(); };
    </script>
</body>
</html>
